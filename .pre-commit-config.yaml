default_language_version:
  python: python3

repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: Format with ruff
        entry: env LC_ALL=C.UTF-8 uv run ruff format
        language: system
        types: [python]

      - id: ruff-lint
        name: Lint with ruff
        entry: env LC_ALL=C.UTF-8 uv run ruff check --fix
        language: system
        types: [python]
